name: Build Flex Yemen

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      - name: Create fresh Android project
        run: |
          mkdir -p /tmp/fresh_project
          cd /tmp/fresh_project
          flutter create --org com.flexyemen --project-name flex_temp .
          cd $GITHUB_WORKSPACE
          rm -rf android ios
          cp -r /tmp/fresh_project/android .
          cp -r /tmp/fresh_project/ios .
          rm -rf /tmp/fresh_project

      - name: Fix minSdkVersion
        run: |
          # تغيير minSdkVersion من 21 إلى 23
          sed -i 's/minSdkVersion 21/minSdkVersion 23/g' android/app/build.gradle
          # إضافة compileSdkVersion 34 إذا لم تكن موجودة
          grep -q "compileSdkVersion 34" android/app/build.gradle || sed -i '/android {/a \    compileSdkVersion 34' android/app/build.gradle

      - name: Set app name
        run: |
          sed -i 's/android:label="flex_temp"/android:label="Flex Yemen Market"/g' android/app/src/main/AndroidManifest.xml

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/*.apk
